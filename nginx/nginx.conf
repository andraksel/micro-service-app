events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        set $user_service user-service:8000;
        set $product_service product-service:8000;
        set $order_service order-service:8000;
        set $payment_service payment-service:8000;
        set $notification_service notification-service:8000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $http_x_request_id;

        location = /health {
            add_header Content-Type application/json;
            return 200 '{"status":"ok","service":"nginx"}';
        }

        location = /ready {
            add_header Content-Type application/json;
            return 200 '{"status":"ready","service":"nginx"}';
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location = /api/users/health { rewrite ^ /health break; proxy_pass http://$user_service; }
        location = /api/users/ready { rewrite ^ /ready break; proxy_pass http://$user_service; }
        location = /api/users/metrics { rewrite ^ /metrics break; proxy_pass http://$user_service; }
        location = /api/users { rewrite ^ /users break; proxy_pass http://$user_service; }
        location /api/users/ {
            rewrite ^/api/users(/.*)$ /users$1 break;
            proxy_pass http://$user_service;
        }

        location = /api/products/health { rewrite ^ /health break; proxy_pass http://$product_service; }
        location = /api/products/ready { rewrite ^ /ready break; proxy_pass http://$product_service; }
        location = /api/products/metrics { rewrite ^ /metrics break; proxy_pass http://$product_service; }
        location = /api/products { rewrite ^ /products break; proxy_pass http://$product_service; }
        location /api/products/ {
            rewrite ^/api/products(/.*)$ /products$1 break;
            proxy_pass http://$product_service;
        }

        location = /api/orders/health { rewrite ^ /health break; proxy_pass http://$order_service; }
        location = /api/orders/ready { rewrite ^ /ready break; proxy_pass http://$order_service; }
        location = /api/orders/metrics { rewrite ^ /metrics break; proxy_pass http://$order_service; }
        location = /api/orders { rewrite ^ /orders break; proxy_pass http://$order_service; }
        location /api/orders/ {
            rewrite ^/api/orders(/.*)$ /orders$1 break;
            proxy_pass http://$order_service;
        }

        location = /api/payments/health { rewrite ^ /health break; proxy_pass http://$payment_service; }
        location = /api/payments/ready { rewrite ^ /ready break; proxy_pass http://$payment_service; }
        location = /api/payments/metrics { rewrite ^ /metrics break; proxy_pass http://$payment_service; }
        location = /api/payments/test-controls/payment-mode { rewrite ^ /test-controls/payment-mode break; proxy_pass http://$payment_service; }
        location = /api/payments { rewrite ^ /payments break; proxy_pass http://$payment_service; }
        location /api/payments/ {
            rewrite ^/api/payments(/.*)$ /payments$1 break;
            proxy_pass http://$payment_service;
        }

        location = /api/notifications/health { rewrite ^ /health break; proxy_pass http://$notification_service; }
        location = /api/notifications/ready { rewrite ^ /ready break; proxy_pass http://$notification_service; }
        location = /api/notifications/metrics { rewrite ^ /metrics break; proxy_pass http://$notification_service; }
        location = /api/notifications { rewrite ^ /notifications break; proxy_pass http://$notification_service; }
        location /api/notifications/ {
            rewrite ^/api/notifications(/.*)$ /notifications$1 break;
            proxy_pass http://$notification_service;
        }
    }
}
